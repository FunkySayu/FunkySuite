name: Package addon

on:
  push:
    branches:
      - main
    tags:
      - '*'
    paths-ignore:
      - '.github/**'
      - "README.md"
      - 'ldoc.ltp'

jobs:
  build:
    runs-on: ubuntu-latest
    concurrency:
        group: packager

    steps:
    
      - name: Checkout addon
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Package
        uses: BigWigsMods/packager@master
        with:
          args: -p 1592358 -a QNlzx4Ke
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          WAGO_API_TOKEN: ${{ secrets.WAGO_API_TOKEN }}
